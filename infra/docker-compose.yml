services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deedscout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - deedscout_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deedscout"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/deedscout
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: ./.storage
      LLM_PROVIDER: mock
    ports:
      - "8000:8000"
    volumes:
      - ../.storage:/app/.storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  deedscout_postgres:
